name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: CenterSpeed-win-x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: CenterSpeed-linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore CenterSpeed/CenterSpeed.csproj

      - name: Publish
        run: >
          dotnet publish CenterSpeed/CenterSpeed.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --no-self-contained
          --output publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish/${{ matrix.rid }}/
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: CenterSpeed-win-x64
          path: artifacts/win-x64

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: CenterSpeed-linux-x64
          path: artifacts/linux-x64

      - name: Zip artifacts
        run: |
          cd artifacts
          zip -r CenterSpeed-win-x64.zip win-x64/
          zip -r CenterSpeed-linux-x64.zip linux-x64/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/CenterSpeed-win-x64.zip
            artifacts/CenterSpeed-linux-x64.zip
          generate_release_notes: true
